# Minimal collection deployment.
# Assumes OVRTX or a compatible render endpoint is reachable from Docker
# containers at host.docker.internal:8001.

name: content-agents-minimal

agents:
  material:
    enabled: true
    host_port: 8100
  physics:
    enabled: true
    host_port: 8200
  texture:
    enabled: true
    host_port: 8300

dependencies:
  render:
    enabled: true
    provider: external
    endpoint: http://host.docker.internal:8001
  vlm:
    enabled: false
    provider: external
    endpoint: ""
  llm:
    enabled: false
    provider: external
    endpoint: ""
  image_gen:
    enabled: false
    provider: external
    endpoint: ""
  embeddings:
    enabled: false
    provider: external
    endpoint: ""

runtime:
  max_active_sessions:
    material: 1
    physics: 1
    texture: 4
  render_concurrency: 1
