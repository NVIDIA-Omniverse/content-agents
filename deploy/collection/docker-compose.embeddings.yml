services:
  embeddings-nim:
    image: nvcr.io/nim/nvidia/llama-nemotron-embed-vl-1b-v2:${COLLECTION_EMBEDDINGS_TAG:-1.12.0}
    container_name: content-embeddings-nim
    ports:
      - "${COLLECTION_EMBEDDINGS_PORT:-8004}:8000"
    environment:
      - NGC_API_KEY=${NGC_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - NVIDIA_VISIBLE_DEVICES=${COLLECTION_EMBEDDINGS_GPU_DEVICE_ID:-all}
      - NIM_CACHE_PATH=/opt/nim/.cache
    shm_size: ${COLLECTION_EMBEDDINGS_SHM_SIZE:-16gb}
    volumes:
      - ${COLLECTION_EMBEDDINGS_CACHE_VOLUME:-embeddings-nim-cache}:/opt/nim/.cache
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "3"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 60
      start_period: 120s

volumes:
  embeddings-nim-cache:
    driver: local
