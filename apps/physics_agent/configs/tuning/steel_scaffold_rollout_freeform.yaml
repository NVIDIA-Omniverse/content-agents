#
# Production-style behavior rollout scenario for the SimReady steel rolling
# scaffold Validation Agent fixture. Use with ``physics-agent refine`` and
# ``--engine ovphysx`` to produce the evidence expected by
# ``examples/validation_agent/simready_v1_profile.yaml``.

name: freeform
metric: judge_score

target:
  description: >
    Steel rolling scaffold behavior rollout: the scaffold should roll forward
    smoothly, remain upright, avoid tipping over, and never fall through the
    floor.
  duration_s: 2.0
  gravity: -9.81
  sample_fps: 30
  initial_pose:
    position: [0.0, 0.25, 0.0]
    rotation: [0.0, 0.0, 0.0]
  initial_velocity: [0.7, 0.0, 0.0]
  initial_angular_velocity: [0.0, 0.0, 0.0]
  surface:
    friction: 0.8
  observations:
    - "the scaffold remains upright and stable"
    - "the scaffold rolls forward smoothly"
    - "the scaffold does not tip over"
    - "the scaffold does not fall through the floor"
  cameras: ["+x+y+z"]
  camera_ground_bias_fraction: 0.6
  record_video: "end_of_tune"
  video_image_width: 512
  video_image_height: 512
  video_sensor_updates: 32
  video_render_mode: "rt2"

judge:
  temperature: 0.0
  max_tokens: 2048

parameters:
  - name: mass_scale
    min: 0.75
    max: 1.5
  - name: static_friction
    min: 0.2
    max: 1.5
  - name: dynamic_friction
    min: 0.1
    max: 1.2
  - name: restitution
    min: 0.0
    max: 0.3
