services:
  physics-agent-service:
    build:
      context: ../..
      dockerfile: apps/physics_agent_service/Dockerfile
    container_name: physics-agent-service
    ports:
      - "8000:8000"
    depends_on:
      ovrtx-rendering-api:
        condition: service_healthy
    env_file:
      # Repo-root .env is the canonical place for API keys (NVIDIA_API_KEY,
      # OPENAI_API_KEY, etc.). It is loaded into the container directly --
      # do NOT re-list those keys under `environment:` with `${VAR:-}`
      # substitution: that would clobber the env_file value with an empty
      # string when Compose's substitution context (the project directory,
      # i.e. this compose file's parent dir) does not contain the var.
      - path: ../../.env
        required: false
    environment:
      # Service configuration
      - RENDER_ENDPOINT=http://ovrtx-rendering-api:8000
      - PA_SESSION_STORAGE_PATH=/var/physics-agent/sessions
      - PA_SESSION_TTL_HOURS=${PA_SESSION_TTL_HOURS:-24}
      - PA_MAX_ACTIVE_SESSIONS=${PA_MAX_ACTIVE_SESSIONS:-1}
      - PA_MAX_UPLOAD_SIZE_MB=${PA_MAX_UPLOAD_SIZE_MB:-500}
      - PA_DEBUG=${PA_DEBUG:-false}
      - PA_RENDER_BACKEND=${PA_RENDER_BACKEND:-remote}

      # VLM/LLM configuration
      - PA_VLM_BACKEND=${PA_VLM_BACKEND:-nim}
      - PA_VLM_MODEL=${PA_VLM_MODEL:-qwen/qwen3.5-397b-a17b}
      - PA_VLM_TEMPERATURE=${PA_VLM_TEMPERATURE:-1.0}

      # NOTE: VLM provider API keys (NVIDIA_API_KEY, OPENAI_API_KEY,
      # ANTHROPIC_API_KEY, GOOGLE_API_KEY) and NGC_API_KEY are passed
      # through from the env_file above. NGC_API_KEY is only required when
      # RENDER_ENDPOINT is overridden to a real NVCF function URL; the
      # bundled OVRTX sidecar ignores the Authorization header.

    volumes:
      # Persist session data
      - session-storage:/var/physics-agent/sessions

    restart: unless-stopped

    # Add logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

    # Resource limits and GPU access
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G
        reservations:
          cpus: '2'
          memory: 4G

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ovrtx-rendering-api:
    build:
      context: ../..
      dockerfile: apps/ovrtx_rendering_api/Dockerfile
    container_name: physics-ovrtx-rendering-api
    ports:
      - "8001:8000"
    environment:
      - OVRTX_LOG_LEVEL=${OVRTX_LOG_LEVEL:-warn}
      - OVRTX_NUM_SENSOR_UPDATES=${OVRTX_NUM_SENSOR_UPDATES:-500}
      - OVRTX_RENDER_MODE=${OVRTX_RENDER_MODE:-pt}
      # Safety valves for wedged OVRTX subprocesses. Set either to 0 to
      # disable the corresponding timeout.
      - OVRTX_DAEMON_START_TIMEOUT=${OVRTX_DAEMON_START_TIMEOUT:-600}
      - OVRTX_DAEMON_RENDER_TIMEOUT=${OVRTX_DAEMON_RENDER_TIMEOUT:-1800}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      # OVRTX cold start commonly takes around 5 minutes before
      # gpu_initialized flips to true.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health | grep -q '\"gpu_initialized\":true'"]
      interval: 30s
      timeout: 10s
      retries: 12
      start_period: 120s

volumes:
  session-storage:
    driver: local

networks:
  default:
    name: physics-agent-network
    driver: bridge
