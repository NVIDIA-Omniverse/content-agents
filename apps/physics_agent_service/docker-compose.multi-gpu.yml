# Opt-in overlay that pins rendering and VLM NIM to separate GPUs.
#
# Required for `--profile vlm` because the NIM profile selector refuses to
# launch when any other process holds VRAM on the same GPU (it reports
# `Free GPUs: <None>` regardless of how much VRAM is actually free). Using
# this overlay places ovrtx-rendering-api on GPU 0 and vlm-nim on GPU 1.
#
# Usage:
#   docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.multi-gpu.yml \
#     --profile vlm up -d --build
#
# Requires a host with at least 2 visible GPUs. For hosts with more than 2,
# copy this file and adjust the device_ids to any free pair.
#
# This overlay also routes physics-agent-service VLM calls through the local
# vlm-nim sidecar. The base compose file keeps cloud defaults; only operators
# who opt into `--profile vlm` talk to the local sidecar.
services:
  physics-agent-service:
    environment:
      - PA_VLM_NIM_BASE_URL=http://vlm-nim:8000/v1
      - PA_VLM_MODEL=nvidia/cosmos-reason2-8b
      - PA_LLM_NIM_BASE_URL=http://vlm-nim:8000/v1
      - PA_NIM_API_KEY=not-used

  ovrtx-rendering-api:
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

  vlm-nim:
    image: nvcr.io/nim/nvidia/cosmos-reason2-8b:1.6.0
    container_name: physics-vlm-nim
    profiles:
      - vlm
    ports:
      - "8003:8000"
    env_file:
      - path: ../../.env
        required: false
    environment:
      - NIM_MAX_MODEL_LEN=${NIM_MAX_MODEL_LEN:-131072}
      - NVIDIA_VISIBLE_DEVICES=1
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 40
      start_period: 120s
