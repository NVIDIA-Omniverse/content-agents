    Body_create_tune_tune_post:
      properties:
        physics_usd:
          type: string
          contentMediaType: application/octet-stream
          title: Physics Usd
          description: Physics-authored USD (output of apply_physics) to tune
        s3_uri:
          type: string
          title: S3 Uri
          description: S3 URI to a physics-authored USD
        source_session_id:
          type: string
          title: Source Session Id
          description: Pipeline session ID — copy its apply_physics output_usd
        reference_images:
          items:
            type: string
            contentMediaType: application/octet-stream
          type: array
          title: Reference Images
          default: []
          description: Optional reference images for the visual/VLM judge
        reference_videos:
          items:
            type: string
            contentMediaType: application/octet-stream
          type: array
          title: Reference Videos
          default: []
          description: Optional reference videos for the visual/VLM judge
        reference_descriptions:
          type: string
          title: Reference Descriptions
          default: ''
          description: Optional JSON array of descriptions parallel to reference_images
        reference_video_descriptions:
          type: string
          title: Reference Video Descriptions
          default: ''
          description: Optional JSON array of descriptions parallel to reference_videos
        scenario_yaml:
          type: string
          title: Scenario Yaml
          default: ''
          description: >-
            Scenario YAML body (drop_settle etc.). Optional when `user_prompt`
            is supplied — the NL interpreter authors a Scenario in that case.
            When both are supplied, explicit YAML fields override interpreter
            output.
        user_prompt:
          type: string
          title: User Prompt
          default: ''
          description: >-
            Free-form NL description of the desired tune run
            (e.g. "make this object bouncy"). Persisted to
            tune_results.json['user_prompt'] and rendered into report.md
            for audit. Mirrors the user_prompt field on /pipeline.
        optimizer:
          type: string
          title: Optimizer
          default: auto
          description: 'auto (=botorch), botorch, random, cma-es'
        engine:
          type: string
          title: Engine
          default: ovphysx
          enum:
          - ovphysx
          - newton
          - fake
          description: 'Tuning engine: ovphysx (PhysX 5 daemon, production), newton (NVIDIA Newton GPU/MuJoCo-warp; requires the apps/physics_agent[newton] extra; supports contact_ke/contact_kd bounce tuning; no static_friction or restitution tuning yet), or fake (tests).'
        max_trials:
          type: integer
          title: Max Trials
          default: 30
          description: Optimizer trial budget
        seed:
          type: integer
          title: Seed
          default: 42
          description: Seed for optimizer + backend
        enable_judge:
          type: boolean
          title: Enable Judge
          default: true
          description: >-
            Run the VLM-as-judge over scenario/history/best_params at the
            end of tune (default on). Set to false for byte-identical
            output to the pre-Part-1.1 baseline (no model calls).
        judge_max_iterations:
          type: integer
          title: Judge Max Iterations
          default: 3
          minimum: 1
          maximum: 10
          description: >-
            Hard cap on refine-loop iterations when the judge returns
            'continue'. v1.1 ships single-iteration judging; values > 1
            are forward-compat plumbing and currently emit a
            tune.judge.refine_skipped event without re-tuning.
        judge_max_tokens:
          anyOf:
          - type: integer
            minimum: 1
          - type: 'null'
          title: Judge Max Tokens
          description: >-
            Optional max output tokens for judge responses.
            Defaults to the physics judge configuration.
        judge_temperature:
          anyOf:
          - type: number
            minimum: 0
          - type: 'null'
          title: Judge Temperature
          description: >-
            Optional temperature for judge calls. Defaults
            to the scenario judge block or physics judge configuration.
      type: object
      title: Body_create_tune_tune_post
      description: >-
        Either `scenario_yaml` or `user_prompt` must be supplied (both
        empty returns 400). When both are supplied the explicit YAML
        wins on every conflict and the NL interpreter only fills gaps.
        Exactly one of `physics_usd`, `s3_uri`, `source_session_id` must
        be supplied as the asset source — the schema enforces this via
        `oneOf` so generated clients reject combinations the server
        otherwise rejects with 400 only at runtime
        (CodeRabbit Round 11 thread #2).
      oneOf:
        - required:
            - physics_usd
        - required:
            - s3_uri
        - required:
            - source_session_id
    TuneStatus:
      properties:
        session_id:
          type: string
        status:
          type: string
        n_trials:
          type: integer
          default: 0
        max_trials:
          type: integer
          default: 0
        best_score:
          anyOf:
          - type: number
          - type: 'null'
        best_params:
          anyOf:
          - type: object
            additionalProperties:
              type: number
          - type: 'null'
        elapsed_seconds:
          type: integer
        can_cancel:
          type: boolean
        created_at:
          type: string
        updated_at:
          type: string
      required:
      - session_id
      - status
      - elapsed_seconds
      - can_cancel
      - created_at
      - updated_at
      type: object
      title: TuneStatus
    TuneResults:
      properties:
        session_id:
          type: string
        status:
          type: string
        best_params:
          type: object
          additionalProperties:
            type: number
        best_score:
          # Nullable: a tune cancelled before the first trial completed
          # (or whose backend never produced a finite score) returns
          # ``best_score: null`` via the R12+R15 ``_coerce_finite_score``
          # path. Mirrors ``TuneStatus.best_score``'s schema so generated
          # clients accept both shapes (kimbyn 2026-05-12).
          anyOf:
          - type: number
          - type: 'null'
        n_trials:
          type: integer
        optimizer_used:
          type: string
        engine_used:
          type: string
        download_urls:
          type: object
          additionalProperties:
            type: string
        duration_seconds:
          type: integer
        completed_at:
          type: string
        error_message:
          anyOf:
          - type: string
          - type: 'null'
          description: Failure reason for terminal failed sessions that still
            expose partial tune results and artifact URLs.
      required:
      - session_id
      - status
      - best_score
      - n_trials
      - optimizer_used
      - engine_used
      - duration_seconds
      - completed_at
      type: object
      title: TuneResults
