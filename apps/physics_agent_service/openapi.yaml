openapi: 3.1.0
info:
  title: Physics Agent Service
  description: "The Physics Agent Service takes a USD file (uploaded directly or\
    \ referenced by S3 URI) as input and runs a multi-step VLM-based classification\
    \ pipeline: build_dataset_usd \u2192 prepare_dataset \u2192 predict \u2192 apply_physics.\
    \ It produces predictions (JSONL), an HTML report, and a simulation-ready USD\
    \ with UsdPhysics schemas applied for each prim in the scene.\n\n## Highlights\n\n\
    * End-to-end pipeline\n    * POST a USD file (multipart) or an S3 URI to start the pipeline.\n\
    \    * Two-step upload supported via POST /pipeline/upload-usd followed by POST /pipeline with session_id.\n\
    \    * Produces predictions.jsonl, an HTML classification report, and a simulation-ready\
    \ USD (scene_physics.<output extension>) with UsdPhysics RigidBodyAPI / CollisionAPI\
    \ / MassAPI / MaterialAPI authored on each predicted prim.\n* Flexible\
    \ configuration\n    * Server-side defaults control rendering modes, VLM prompts,\
    \ and prediction settings.\n    * Supports multiple rendering modes (prim_only, composition,\
    \ etc.).\n    * Configurable VLM backend and model.\n    * Selectable rendering\
    \ backend via API parameter:\n        * `remote` (default in the bundled Docker\
    \ Compose) \u2014 HTTP render service. The public compose points this at the OVRTX\
    \ sidecar, so the main service stays CPU-only.\n        * `warp` \u2014 In-process\
    \ CUDA GPU raytracer. Fast (~29ms/frame), no Vulkan/DISPLAY needed.\n        *\
    \ `ovrtx` \u2014 Local RTX path tracer via OvRTX subprocess. PBR quality, requires\
    \ Vulkan.\n\n* Real-time monitoring\n    * Server-Sent Events (SSE) stream provides\
    \ live updates with:\n    * Current step, state, per-step progress, and overall\
    \ percentage.\n    * Automatic reconnection; polling fallback available via status\
    \ endpoint.\n    * Cancel running pipelines via a dedicated endpoint.\n\n* Visual\
    \ feedback\n    * Live preview gallery during the rendering stage.\n    * On-demand\
    \ HTML report generation with per-prim classifications.\n"
  version: 0.1.0
paths:
  /pipeline/upload-usd:
    post:
      tags:
      - pipeline
      summary: Upload Usd Immediate
      description: Upload a USD file and create a session for later pipeline execution.
      operationId: upload_usd_immediate_pipeline_upload_usd_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_usd_immediate_pipeline_upload_usd_post'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCreated'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /pipeline:
    post:
      tags:
      - pipeline
      summary: Create Pipeline
      description: Create and execute a physics agent pipeline.
      operationId: create_pipeline_pipeline_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_create_pipeline_pipeline_post'
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCreated'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /pipeline/{session_id}/status:
    get:
      tags:
      - pipeline
      summary: Get Pipeline Status
      description: 'Get pipeline execution status with detailed progress.


        Reads from in-memory event bus state for fast, real-time accuracy.

        Falls back to store-based SessionManager for completed/cross-instance sessions.'
      operationId: get_pipeline_status_pipeline__session_id__status_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineStatus'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /pipeline/{session_id}/results:
    get:
      tags:
      - pipeline
      summary: Get Pipeline Results
      description: Get pipeline execution results (only available when completed).
      operationId: get_pipeline_results_pipeline__session_id__results_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                anyOf:
                - $ref: '#/components/schemas/PipelineResults'
                - $ref: '#/components/schemas/PipelineError'
                title: Response Get Pipeline Results Pipeline  Session Id  Results
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /pipeline/{session_id}/cancel:
    post:
      tags:
      - pipeline
      summary: Cancel Pipeline
      description: 'Cancel a running pipeline.


        Works cross-instance: writes a cancel signal to the store (S3)

        so the executing instance can detect it. Also tries local cancellation.'
      operationId: cancel_pipeline_pipeline__session_id__cancel_post
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /pipeline/{session_id}/events:
    get:
      tags:
      - pipeline
      summary: Stream Progress Events
      description: 'Stream real-time progress events via Server-Sent Events (SSE).


        Only works when connected to the instance running the pipeline.

        For cross-instance progress, use GET /pipeline/{session_id}/status (polling).'
      operationId: stream_progress_events_pipeline__session_id__events_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /pipeline/{session_id}/regenerate:
    post:
      tags:
      - pipeline
      summary: Regenerate Pipeline
      description: Regenerate specific pipeline steps from cached data.
      operationId: regenerate_pipeline_pipeline__session_id__regenerate_post
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegenerateRequest'
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCreated'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /predict:
    post:
      tags:
      - predict
      summary: Create Predict
      description: |
        Create and execute a prediction-only job. Distinct from `/pipeline`:
        runs prediction (and the minimum upstream prep, if needed), but exposes
        a separate session lifecycle and result endpoints. Use `/pipeline` for
        the full classify/apply flow.

        Two input modes (auto-detected at job start):

        * **Mode A — dataset already prepared.** Triggered when `dataset_path`
          points at a readable dataset.jsonl, or when an existing `session_id`
          already has `cache/dataset/dataset.jsonl`. Only the predict step runs.
        * **Mode B — USD upload / s3_uri / fresh session_id.** When no prepared
          dataset is present, /predict runs the minimum upstream steps
          (`optimize_usd` if enabled → `identify_asset` → `build_dataset_usd` →
          `build_dataset_prepare_dataset`) before predicting. `apply_physics`
          is intentionally not part of /predict — use POST /pipeline if you
          need the full classify/apply flow.

        The detected mode is persisted to session metadata under `predict_mode`
        and surfaced in the `GET /predict/{id}/results` response.
      operationId: create_predict_predict_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_create_predict_predict_post'
      responses:
        '202':
          description: Predict job accepted and queued for execution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCreated'
        '400':
          description: Missing/invalid input — no usd_file/session_id/s3_uri/dataset_path, ambiguous combinations (e.g. usd_file + s3_uri, dataset_path + s3_uri), invalid USD extension, missing dataset, or invalid optimizer config.
        '403':
          description: dataset_path resolves outside allowed roots, or S3 access denied.
        '404':
          description: Session not found, or S3 object not found.
        '409':
          description: Predict is already pending/running/cancelling for the supplied session_id, OR the same-pod JobRegistry rerun race-guard fired (the slot was reserved by a concurrent /predict on this instance). Wait for a terminal state or cancel first.
        '413':
          description: Upload or S3 file exceeds the configured size limit.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '500':
          description: Internal failure staging the upload, dataset, or session.
        '502':
          description: Failed to download from S3 upstream.
  /predict/{session_id}/status:
    get:
      tags:
      - predict
      summary: Get Predict Status
      description: Get predict execution status with detailed progress.
        Reuses the same response schema as `/pipeline/{id}/status`.
      operationId: get_predict_status_predict__session_id__status_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineStatus'
        '404':
          description: Session not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /predict/{session_id}/results:
    get:
      tags:
      - predict
      summary: Get Predict Results
      description: |
        Get predict execution results (only available when completed). Surfaces
        `predictions_count`, `failed_count`, `predictions_path`, and
        `token_stats` directly (not buried inside `stats`) so they line up with
        the source-of-truth Python `PredictOutput`.
      operationId: get_predict_results_predict__session_id__results_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Predict completed successfully.
          content:
            application/json:
              schema:
                anyOf:
                - $ref: '#/components/schemas/PredictResults'
                - $ref: '#/components/schemas/PipelineError'
                title: Response Get Predict Results Predict  Session Id  Results Get
        '202':
          description: Predict still pending or running.
        '404':
          description: Session not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /predict/{session_id}/cancel:
    post:
      tags:
      - predict
      summary: Cancel Predict
      description: Cancel a running predict job.
      operationId: cancel_predict_predict__session_id__cancel_post
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Cancellation requested.
          content:
            application/json:
              schema: {}
        '400':
          description: Job not in a cancellable state.
        '404':
          description: Session not found
        '409':
          description: Session is not a predict session — it was created via /pipeline or /pipeline/upload-usd. Use POST /pipeline/{session_id}/cancel instead.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /predict/{session_id}/events:
    get:
      tags:
      - predict
      summary: Stream Predict Events
      description: Stream real-time predict progress events via SSE.
        Only works when connected to the executing instance; for
        cross-instance progress, poll GET /predict/{session_id}/status.
      operationId: stream_predict_events_predict__session_id__events_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events stream of predict progress.
        '404':
          description: Session not found
        '503':
          description: Predict is running on a different instance; use polling.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /pipeline/{session_id}/event-log:
    get:
      tags:
      - pipeline
      summary: Get Event Log
      description: Get the persisted event log for a session.
      operationId: get_event_log_pipeline__session_id__event_log_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /artifacts/{session_id}/predictions:
    get:
      tags:
      - artifacts
      summary: Download Predictions
      description: Download predictions JSONL file.
      operationId: download_predictions_artifacts__session_id__predictions_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /artifacts/{session_id}/report:
    get:
      tags:
      - artifacts
      summary: View Prediction Report
      description: 'View prediction HTML report in browser.


        Generates the report on-demand if it doesn''t exist yet.'
      operationId: view_prediction_report_artifacts__session_id__report_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /artifacts/{session_id}/dataset:
    get:
      tags:
      - artifacts
      summary: Download Dataset
      description: Download dataset JSONL file.
      operationId: download_dataset_artifacts__session_id__dataset_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /artifacts/{session_id}/output-usd:
    get:
      tags:
      - artifacts
      summary: Download Output USD
      description: 'Download the simulation-ready USD written by the apply_physics
        step.


        Returned only when the pipeline has completed with apply_physics enabled
        (the service default). USD, USDA, and USDC inputs are returned as
        scene_physics.usd, scene_physics.usda, or scene_physics.usdc. USDZ
        inputs default to scene_physics.usda so Omniverse MDL shader references
        can remain as runtime-resolved asset paths instead of being bundled
        into a new USDZ package. UsdPhysics schemas (RigidBodyAPI, CollisionAPI, MassAPI,
        MaterialAPI) are authored on each predicted prim, plus a PhysicsScene.
        Consumable by PhysX / Isaac.'
      operationId: download_output_usd_artifacts__session_id__output_usd_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            model/vnd.usdz+zip:
              schema:
                type: string
                format: binary
            text/plain:
              schema:
                type: string
                format: binary
        '404':
          description: Session or output USD not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /sessions:
    get:
      tags:
      - sessions
      summary: List Sessions
      description: 'List all sessions with metadata.


        Returns sessions from the store (S3 or local), so all instances

        see the same list.'
      operationId: list_sessions_sessions_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /sessions/{session_id}:
    get:
      tags:
      - sessions
      summary: Get Session
      description: Get detailed session information.
      operationId: get_session_sessions__session_id__get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - sessions
      summary: Delete Session
      description: Delete a session and all its artifacts.
      operationId: delete_session_sessions__session_id__delete
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /tune:
    post:
      tags:
      - tune
      summary: Create Tune Session
      description: |
        Create and queue a tuning session over an authored physics USD.

        Exactly one of `physics_usd`, `s3_uri`, or `source_session_id` must be
        provided. `scenario_yaml` is the body of a tuning scenario YAML
        (drop_settle in v1).
      operationId: create_tune_tune_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_create_tune_tune_post'
      responses:
        '202':
          description: Tune queued for execution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCreated'
        '400':
          description: Invalid scenario or input USD
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /tune/{session_id}/status:
    get:
      tags:
      - tune
      summary: Get Tune Status
      operationId: get_tune_status_tune__session_id__status_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Tune status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TuneStatus'
        '404':
          description: Session not found
  /tune/{session_id}/results:
    get:
      tags:
      - tune
      summary: Get Tune Results
      operationId: get_tune_results_tune__session_id__results_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Tune results when completed (TuneResults), or
            PipelineError payload when the run failed.
          content:
            application/json:
              schema:
                anyOf:
                - $ref: '#/components/schemas/TuneResults'
                - $ref: '#/components/schemas/PipelineError'
                title: Response Get Tune Results Tune  Session Id  Results Get
        '202':
          description: Tune still running
        '404':
          description: Session not found
  /tune/{session_id}/events:
    get:
      tags:
      - tune
      summary: Stream Tune Events
      description: Server-Sent Events stream of trial-level progress.
      operationId: stream_tune_events_tune__session_id__events_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: text/event-stream
          content:
            text/event-stream:
              schema:
                type: string
                format: text
                description: |
                  SSE stream of tune lifecycle events. Each frame is a
                  JSON-encoded ProgressEvent. Stream terminates on
                  COMPLETED / FAILED / CANCELLED / tune_ready.
        '404':
          description: Session not found
  /tune/{session_id}/cancel:
    post:
      tags:
      - tune
      summary: Cancel Tune
      operationId: cancel_tune_tune__session_id__cancel_post
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Cancellation requested
        '400':
          description: Cannot cancel from current status
        '404':
          description: Session not found
        '409':
          description: Session is not a tune session — its metadata is missing an explicit `kind == "tune"` discriminator. Sessions created via `/pipeline` or `/predict` (or via the bare `SessionManager.create_session()` default) cannot be cancelled through this route; use POST /pipeline/{session_id}/cancel or POST /predict/{session_id}/cancel instead.
  /tune/{session_id}/artifacts/{name}:
    get:
      tags:
      - tune
      summary: Download Tune Artifact
      description: |
        Download one of the canonical tune artifacts:
        `best_params.json`, `tune_results.json`, `history.jsonl`,
        `report.md`, `tuned_physics.usda`, or the optional visual judge
        contact sheet `comparison.png`.
      operationId: download_tune_artifact_tune__session_id__artifacts__name__get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      - name: name
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Artifact bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
                description: |
                  Raw artifact bytes. Concrete content type depends on the
                  requested artifact: `best_params.json` /
                  `tune_results.json` are JSON, `history.jsonl` is
                  JSON-lines, `report.md` is markdown,
                  `tuned_physics.usda` is a text-format USD layer, and
                  `comparison.png` is a PNG image when visual judging ran.
                  Generated SDKs should treat the response as a binary
                  download.
        '404':
          description: Unknown artifact or session not found
  /health:
    get:
      summary: Health Check
      description: Health check endpoint.
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api:
    get:
      summary: Root Api Info
      description: Root endpoint with service info.
      operationId: root_api_info_api_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /:
    get:
      summary: Root
      description: Root endpoint redirects to API info.
      operationId: root__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    Body_create_pipeline_pipeline_post:
      properties:
        usd_file:
          type: string
          contentMediaType: application/octet-stream
          title: Usd File
          description: USD file to process (optional if session_id or s3_uri provided)
        session_id:
          type: string
          title: Session Id
          description: Existing session ID (from /upload-usd endpoint)
        s3_uri:
          type: string
          title: S3 Uri
          description: S3 URI to a USD file (e.g. s3://bucket/path/scene.usdz)
        user_prompt:
          type: string
          title: User Prompt
          description: Custom user prompt for VLM (optional)
          default: ''
        render_backend:
          type: string
          title: Render Backend
          description: 'Rendering backend: ''remote'' (default, HTTP render service;
            the bundled compose points this at the OVRTX sidecar), ''warp'' (local
            CUDA), or ''ovrtx'' (local Vulkan subprocess)'
          default: ''
        optimize_usd:
          type: boolean
          title: Optimize Usd
          description: 'Enable USD optimization step (default: false). When enabled,
            runs Scene Optimizer before rendering/prediction and restore_usd afterward
            to map results back to original paths.'
          default: false
        enable_deinstance:
          type: boolean
          title: Enable Deinstance
          description: 'Enable deinstance operation when optimize_usd is true (default:
            true). Required for instanced USD assets (e.g. robot arms with shared
            prototypes). FastAPI accepts common boolean form values such as true/false,
            1/0, yes/no, and on/off.'
          default: true
        enable_split:
          type: boolean
          title: Enable Split
          description: 'Enable split meshes operation when optimize_usd is true (default:
            false).'
          default: false
        enable_deduplicate:
          type: boolean
          title: Enable Deduplicate
          description: 'Enable deduplicate operation when optimize_usd is true (default:
            false).'
          default: false
      type: object
      title: Body_create_pipeline_pipeline_post
    Body_create_predict_predict_post:
      properties:
        usd_file:
          type: string
          contentMediaType: application/octet-stream
          title: Usd File
          description: USD file to predict on (Mode B). Optional if dataset_path,
            session_id, or s3_uri is provided.
        session_id:
          type: string
          title: Session Id
          description: Existing session ID (e.g. from POST /pipeline/upload-usd).
            When the session already has a prepared dataset, /predict runs Mode A.
        s3_uri:
          type: string
          title: S3 Uri
          description: S3 URI to a USD file (e.g. s3://bucket/path/scene.usdz).
        dataset_path:
          type: string
          title: Dataset Path
          description: Absolute path to a prepared dataset.jsonl on the server.
            When set and readable, forces Mode A (predict-only).
        user_prompt:
          type: string
          title: User Prompt
          description: Custom user prompt for VLM (optional, used in Mode B).
          default: ''
        render_backend:
          type: string
          title: Render Backend
          description: 'Rendering backend for Mode B: ''remote'' (default), ''warp'',
            or ''ovrtx''. Ignored in Mode A.'
          default: ''
        optimize_usd:
          type: boolean
          title: Optimize Usd
          description: Enable USD optimization step in Mode B.
          default: false
        enable_deinstance:
          type: boolean
          title: Enable Deinstance
          description: Enable deinstance op when optimize_usd=true (Mode B only).
          default: true
        enable_split:
          type: boolean
          title: Enable Split
          description: Enable split-meshes op when optimize_usd=true (Mode B only).
          default: false
        enable_deduplicate:
          type: boolean
          title: Enable Deduplicate
          description: Enable deduplicate op when optimize_usd=true (Mode B only).
          default: false
      type: object
      title: Body_create_predict_predict_post
